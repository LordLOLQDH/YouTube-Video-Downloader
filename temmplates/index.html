<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloader</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

.fake-ad {
  background: #334155;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  text-align: center;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<h2>📥 Video Downloader</h2>

<div class="card">
<form method="POST">
  <input type="text" name="url" placeholder="YouTube Link einfügen..." required>
  <button type="submit">Download starten</button>
</form>
</div>

<div class="fake-ad">
🔥 Tipp: Nur eigene oder freie Videos downloaden
</div>

<div class="card">
💡 Features:<br>
- MP4 Download<br>
- Mobile optimiert<br>
- Schnell & simpel
</div>

<div class="fake-ad">
🚀 Bald: MP3 + Qualität wählen
</div>

<div class="footer">
Private Tool 😎
</div>

</div>

</body>
</html>
